<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Main Gradient: Cyan (Top) to Orange (Bottom) -->
        <linearGradient id="vecGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="10%" stop-color="#00e5ff" />
            <stop offset="60%" stop-color="#a855f7" />
            <stop offset="95%" stop-color="#ff5500" />
        </linearGradient>

        <!-- Glow effects for nodes -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <!-- Intensely blurred glow for the forge area -->
        <filter id="forgeGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Network Edges (The Vector Matrix) -->
    <g stroke="url(#vecGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
        <!-- Left Arm Connections -->
        <line x1="80" y1="100" x2="130" y2="160" />
        <line x1="100" y1="130" x2="160" y2="140" />
        <line x1="130" y1="160" x2="170" y2="210" />
        <line x1="160" y1="140" x2="200" y2="190" />
        <line x1="170" y1="210" x2="200" y2="260" />
        
        <!-- Right Arm Connections -->
        <line x1="320" y1="100" x2="270" y2="160" />
        <line x1="300" y1="130" x2="240" y2="140" />
        <line x1="270" y1="160" x2="230" y2="210" />
        <line x1="240" y1="140" x2="200" y2="190" />
        <line x1="230" y1="210" x2="200" y2="260" />

        <!-- Cross Connections -->
        <line x1="160" y1="140" x2="240" y2="140" opacity="0.4" />
        <line x1="170" y1="210" x2="230" y2="210" opacity="0.5" />
        <line x1="130" y1="160" x2="200" y2="190" opacity="0.3" />
        <line x1="270" y1="160" x2="200" y2="190" opacity="0.3" />

        <!-- Core to Anvil -->
        <line x1="200" y1="190" x2="200" y2="260" stroke-width="4" />
        <line x1="200" y1="260" x2="200" y2="300" stroke-width="6" />
    </g>

    <!-- Vector Nodes (Data Points) -->
    <g fill="url(#vecGrad)" filter="url(#glow)">
        <circle cx="80" cy="100" r="5" />
        <circle cx="100" cy="130" r="4" />
        <circle cx="160" cy="140" r="6" />
        <circle cx="130" cy="160" r="7" />
        <circle cx="170" cy="210" r="5" />
        
        <circle cx="320" cy="100" r="5" />
        <circle cx="300" cy="130" r="4" />
        <circle cx="240" cy="140" r="6" />
        <circle cx="270" cy="160" r="7" />
        <circle cx="230" cy="210" r="5" />

        <circle cx="200" cy="190" r="8" />
    </g>

    <!-- The Forge Core (Intense heat area at the bottom) -->
    <g filter="url(#forgeGlow)">
        <circle cx="200" cy="260" r="10" fill="#ff7700" />
        <circle cx="200" cy="300" r="14" fill="#ff3300" />
        
        <!-- Static Sparks -->
        <circle cx="180" cy="280" r="3" fill="#ffaa00" opacity="0.8" />
        <circle cx="225" cy="290" r="4" fill="#ff5500" opacity="0.9" />
        <circle cx="195" cy="330" r="2.5" fill="#ffcc00" opacity="0.7" />
        <circle cx="210" cy="320" r="2" fill="#ff8800" opacity="0.6" />
        <circle cx="165" cy="305" r="1.5" fill="#ff4400" opacity="0.8" />
        <circle cx="235" cy="270" r="2" fill="#ffaa00" opacity="0.7" />
    </g>
</svg>
